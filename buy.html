<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buy Tickets</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        padding: 20px;
    }
    h1 {
        text-align: center;
    }
    .ticket {
        background: white;
        padding: 15px;
        margin: 10px 0;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .sold {
        background: #ffdddd;
        border-left: 6px solid red;
    }
    .available {
        background: #ddffdd;
        border-left: 6px solid green;
    }
    button {
        padding: 10px 15px;
        border: none;
        background: #007bff;
        color: white;
        border-radius: 6px;
        cursor: pointer;
    }
    button:disabled {
        background: gray;
        cursor: not-allowed;
    }
</style>
</head>
<body>

<h1>Buy Tickets</h1>

<div id="ticketList"></div>

<script>
// Your ticket data (from CSV)
const tickets = [
    {num:1, section:"CLUB 201", seat:"1", price:"75.00", code:"prgEbbDSSS"},
    {num:2, section:"CLUB 201", seat:"2", price:"70.00", code:"n9rhqk7UWz"},
    {num:3, section:"CLUB 201", seat:"3", price:"65.00", code:"GKvqeCVYDd"},
    {num:4, section:"CLUB 201", seat:"4", price:"70.00", code:"TxxUhyW4qr"},
    {num:5, section:"CLUB 201", seat:"5", price:"50.00", code:"BsS91VQLmF"},
    {num:6, section:"101", seat:"1", price:"55.00", code:"T4UbroTzlk"},
    {num:7, section:"101", seat:"2", price:"50.00", code:"FOTur45RPo"},
    {num:8, section:"101", seat:"3", price:"50.00", code:"7A7OqZlG9g"},
    {num:9, section:"101", seat:"4", price:"45.00", code:"mjCjpx6SCb"},
    {num:10, section:"101", seat:"5", price:"50.00", code:"0kRDHcvyhs"},
    {num:11, section:"101", seat:"6", price:"50.00", code:"emlgaYkO08"}
];

// Load sold tickets from localStorage
let sold = JSON.parse(localStorage.getItem("soldTickets") || "[]");

function renderTickets() {
    const list = document.getElementById("ticketList");
    list.innerHTML = "";

    tickets.forEach(t => {
        const isSold = sold.includes(t.code);

        const div = document.createElement("div");
        div.className = "ticket " + (isSold ? "sold" : "available");

        div.innerHTML = `
            <strong>Section:</strong> ${t.section}<br>
            <strong>Seat:</strong> ${t.seat}<br>
            <strong>Price:</strong> $${t.price}<br>
            <strong>Status:</strong> ${isSold ? "SOLD" : "AVAILABLE"}<br><br>
            <button ${isSold ? "disabled" : ""} onclick="buyTicket('${t.code}', '${t.section}', '${t.seat}', '${t.price}')">
                ${isSold ? "Unavailable" : "Buy Ticket"}
            </button>
        `;

        list.appendChild(div);
    });
}

function buyTicket(code, section, seat, price) {
    const master = prompt("Enter master code to purchase:");

    if (master !== "QCenterSoft2026") {
        alert("Incorrect master code.");
        return;
    }

    // Mark ticket as sold
    sold.push(code);
    localStorage.setItem("soldTickets", JSON.stringify(sold));

    // Redirect to ticket page
    window.location.href =
        `ticket.html?section=${section}&seat=${seat}&price=${price}&code=${code}`;
}

renderTickets();
</script>

</body>
</html>
