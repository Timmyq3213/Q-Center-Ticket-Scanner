<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Q Center Ticket Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>

    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 20px; 
            background: #f4f4f4; 
            margin: 0; 
        }

        #scanner { 
            width: 100%; 
            max-width: 600px; 
            height: 350px;
            margin: 20px auto; 
            border: none; 
            border-radius: 8px; 
            overflow: hidden;
            background: black;
        }

        .result { 
            margin: 20px auto; 
            padding: 20px; 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            max-width: 500px; 
        }

        .valid { background: #d4edda; color: #155724; }
        .invalid { background: #f8d7da; color: #721c24; }

        button { 
            padding: 12px 24px; 
            font-size: 16px; 
            margin: 8px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
        }

        button:hover { opacity: 0.9; }

        /* FIXED LOADING SCREEN */
        #loadingScreen {
            display:none;
            position:fixed;
            top:0; left:0;
            width:100%; height:100%;
            background:rgba(0,0,0,0.6);
            color:white;
            font-size:28px;
            align-items:center;
            justify-content:center;
            z-index:9999;
        }
    </style>
</head>
<body>

    <img src="qcenterlogo.PNG" alt="Q Center Logo" 
         style="width:140px; margin-top:10px; margin-bottom:10px;">

    <h1>Q Center Ticket Scanner</h1>

    <button onclick="startScanner()">📷 Start Camera Scanner</button>
    <button onclick="stopScanner()">⏹️ Stop Scanner</button>
    <br><br>

    <input type="text" id="manualCode" placeholder="Enter Ticket Code" 
           style="padding:12px; width:280px; font-size:16px;">
    <button onclick="lookupManual()">🔍 Lookup</button>

    <div id="scanner-container" style="display:none; margin:20px auto;">
        <div id="scanner"></div>
    </div>

    <div id="result" class="result" style="display:none;"></div>

    <audio id="scanSound" src="scannerbeep.mp3"></audio>
    <audio id="validSound" src="validbeep.mp3"></audio>
    <audio id="badSound" src="invalidbeep.mp3"></audio>

    <!-- FIXED LOADING SCREEN -->
    <div id="loadingScreen">Scanning…</div>

    <script>
        let tickets = {};
        let scanning = false;

        async function loadTickets() {
            try {
                const response = await fetch('tickets.csv');
                const text = await response.text();

                const rows = text.split('\n').slice(1);

                rows.forEach(row => {
                    if (!row.trim()) return;

                    const cols = row.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/);

                    const ticketNumber = cols[0]?.trim();
                    const section = cols[1]?.trim();
                    const seat = cols[2]?.trim();
                    const price = cols[3]?.trim();
                    const rowId = cols[4]?.trim();
                    const ticketCode = cols[5]?.trim();
                    const barcodeImage = cols[6]?.trim();

                    if (ticketCode) {
                        tickets[ticketCode] = {
                            ticketNumber,
                            section,
                            seat,
                            price,
                            ticketCode,
                            barcodeImage
                        };
                    }
                });

                console.log("Loaded tickets:", tickets);
            } catch (e) {
                alert("⚠️ Could not load tickets.csv. Make sure it's in the same folder.");
            }
        }

        function playSound(id) {
            const sound = document.getElementById(id);
            sound.currentTime = 0;
            sound.play();
        }

        function showLoading() {
            document.getElementById('scanner-container').style.display = 'none';
            document.getElementById('loadingScreen').style.display = 'flex';
        }

        function hideLoading() {
            document.getElementById('loadingScreen').style.display = 'none';
        }

        function displayResult(ticket, code) {
            const div = document.getElementById('result');

            if (ticket) {
                playSound('validSound');

                div.className = 'result valid';
                div.innerHTML = `
                    <h2>✅ Valid Ticket</h2>
                    <p><strong>Ticket #:</strong> ${ticket.ticketNumber}</p>
                    <p><strong>Section:</strong> ${ticket.section} — <strong>Seat:</strong> ${ticket.seat}</p>
                    <p><strong>Price:</strong> ${ticket.price}</p>
                    <p><strong>Code:</strong> ${ticket.ticketCode}</p>
                    ${ticket.barcodeImage ? 
                        `<img src="${ticket.barcodeImage}" style="max-width:100%; margin-top:15px; border:1px solid #ccc;">` 
                        : ''}
                `;
            } else {
                playSound('badSound');

                div.className = 'result invalid';
                div.innerHTML = `<h2>❌ Ticket Not Found</h2><p>Code: ${code}</p>`;
            }

            div.style.display = 'block';
        }

        function lookupManual() {
            const code = document.getElementById('manualCode').value.trim();
            if (!code) return alert("⚠️ Please enter a ticket code");
            displayResult(tickets[code], code);
        }

        function startScanner() {
            if (scanning) return;
            scanning = true;

            document.getElementById('scanner-container').style.display = 'block';

            Quagga.init({
                inputStream: {
                    type: "LiveStream",
                    target: document.querySelector('#scanner'),
                    constraints: {
                        facingMode: { ideal: "environment" },
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                },
                decoder: {
                    readers: ["code_128_reader"]
                },
                locate: true,
                locator: {
                    patchSize: "medium",
                    halfSample: true
                }
            }, err => {
                if (err) {
                    alert("⚠️ Camera error. Allow camera access or try a different device.");
                    scanning = false;
                    return;
                }

                setTimeout(() => {
                    Quagga.start();
                }, 300);
            });

            Quagga.onProcessed(() => {
                const video = document.querySelector('#scanner video');
                if (video) {
                    video.setAttribute('playsinline', true);
                    video.setAttribute('webkit-playsinline', true);
                }
            });

            Quagga.onDetected(result => {
                if (!scanning) return;
                if (!result.codeResult || !result.codeResult.code) return;

                scanning = false;

                const code = result.codeResult.code.trim();

                playSound('scanSound');

                Quagga.stop();
                document.getElementById('scanner-container').style.display = 'none';

                showLoading();

                setTimeout(() => {
                    hideLoading();

                    if (!tickets[code]) {
                        displayResult(null, code);
                        return;
                    }

                    displayResult(tickets[code], code);

                }, 600);
            });
        }

        function stopScanner() {
            scanning = false;
            Quagga.stop();
            document.getElementById('scanner-container').style.display = 'none';
        }

        window.onload = loadTickets;
    </script>

</body>
</html>
