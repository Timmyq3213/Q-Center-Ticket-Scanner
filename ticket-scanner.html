<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>

    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background: #f4f4f4; margin: 0; }
        #scanner { width: 100%; max-width: 600px; margin: 20px auto; border: 3px solid #333; border-radius: 8px; }
        .result { margin: 20px auto; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; }
        .valid { background: #d4edda; color: #155724; }
        .invalid { background: #f8d7da; color: #721c24; }
        button { padding: 12px 24px; font-size: 16px; margin: 8px; border: none; border-radius: 6px; cursor: pointer; }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <h1>🎟️ Ticket Scanner</h1>

    <button onclick="startScanner()">📷 Start Camera Scanner</button>
    <button onclick="stopScanner()">⏹️ Stop Scanner</button>
    <br><br>

    <input type="text" id="manualCode" placeholder="Enter Ticket Code" style="padding:12px; width:280px; font-size:16px;">
    <button onclick="lookupManual()">🔍 Lookup</button>

    <div id="scanner-container" style="display:none; margin:20px auto;">
        <div id="scanner"></div>
    </div>

    <div id="result" class="result" style="display:none;"></div>

    <script>
        let tickets = {};

        async function loadTickets() {
            try {
                const response = await fetch('tickets.csv');
                const text = await response.text();

                const rows = text.split('\n').slice(1);

                rows.forEach(row => {
                    if (!row.trim()) return;

                    // Split only first 6 commas, leave URL intact
                    const cols = row.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/);

                    const ticketNumber = cols[0]?.trim();
                    const section = cols[1]?.trim();
                    const seat = cols[2]?.trim();
                    const price = cols[3]?.trim();
                    const rowId = cols[4]?.trim();
                    const ticketCode = cols[5]?.trim();
                    const barcodeImage = cols[6]?.trim();

                    if (ticketCode) {
                        tickets[ticketCode] = {
                            ticketNumber,
                            section,
                            seat,
                            price,
                            ticketCode,
                            barcodeImage
                        };
                    }
                });

                console.log("Loaded tickets:", tickets);
            } catch (e) {
                alert("Could not load tickets.csv. Make sure it's in the same folder.");
            }
        }

        function displayResult(ticket, code) {
            const div = document.getElementById('result');

            if (ticket) {
                div.className = 'result valid';
                div.innerHTML = `
                    <h2>✅ Valid Ticket</h2>
                    <p><strong>Ticket #:</strong> ${ticket.ticketNumber}</p>
                    <p><strong>Section:</strong> ${ticket.section} — <strong>Seat:</strong> ${ticket.seat}</p>
                    <p><strong>Price:</strong> ${ticket.price}</p>
                    <p><strong>Code:</strong> ${ticket.ticketCode}</p>
                    ${ticket.barcodeImage ? `<img src="${ticket.barcodeImage}" style="max-width:100%; margin-top:15px; border:1px solid #ccc;">` : ''}
                `;
            } else {
                div.className = 'result invalid';
                div.innerHTML = `<h2>❌ Ticket Not Found</h2><p>Code: ${code}</p>`;
            }

            div.style.display = 'block';
        }

        function lookupManual() {
            const code = document.getElementById('manualCode').value.trim();
            if (!code) return alert("Please enter a ticket code");
            displayResult(tickets[code], code);
        }

        function startScanner() {
            document.getElementById('scanner-container').style.display = 'block';

            Quagga.init({
                inputStream: {
                    type: "LiveStream",
                    target: document.querySelector('#scanner'),
                    constraints: { facingMode: "environment" }
                },
                decoder: {
                    readers: ["code_128_reader"]
                },
                locate: true
            }, err => {
                if (err) {
                    alert("Camera error. Allow camera access or try a different device.");
                    return;
                }
                Quagga.start();
            });

            Quagga.onDetected(result => {
                const code = result.codeResult.code.trim();
                Quagga.stop();
                displayResult(tickets[code], code);
            });
        }

        function stopScanner() {
            Quagga.stop();
            document.getElementById('scanner-container').style.display = 'none';
        }

        window.onload = loadTickets;
    </script>

</body>
</html>
