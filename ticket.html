<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Ticket</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        padding: 20px;
        text-align: center;
    }

    .logo {
        width: 180px;
        margin: 10px auto 10px auto;
        display: block;
    }

    .subtitle {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 20px;
        color: #333;
    }

    .ticket-box {
        background: white;
        padding: 20px;
        border-radius: 12px;
        max-width: 400px;
        margin: auto;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        text-align: left;
    }

    .label {
        font-weight: bold;
    }

    .barcode {
        width: 100%;
        margin-top: 20px;
    }
</style>
</head>
<body>

<!-- ⭐ Your Logo -->
<img src="qcenterlogo.PNG" class="logo" alt="Q Center Logo">

<!-- ⭐ SUBTITLE — CHANGE THIS TEXT ANYTIME -->
<div class="subtitle">Soft Opening</div>
<!-- ⭐ CHANGE ABOVE LINE ONLY to rename event -->

<h1>Your Ticket</h1>

<div class="ticket-box">
    <p><span class="label">Section:</span> <span id="section"></span></p>
    <p><span class="label">Seat:</span> <span id="seat"></span></p>
    <p><span class="label">Price:</span> $<span id="price"></span></p>
    <p><span class="label">Ticket Code:</span> <span id="code"></span></p>

    <img id="barcode" class="barcode" alt="Barcode">
</div>

<script>
// Read URL parameters
const urlParams = new URLSearchParams(window.location.search);
document.getElementById("section").textContent = urlParams.get("section");
document.getElementById("seat").textContent = urlParams.get("seat");
document.getElementById("price").textContent = urlParams.get("price");
document.getElementById("code").textContent = urlParams.get("code");

// Generate barcode using external API
const code = urlParams.get("code");
document.getElementById("barcode").src =
    "https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=" + code;
</script>

</body>
</html>
