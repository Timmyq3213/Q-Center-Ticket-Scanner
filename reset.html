<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reset Scanned Tickets</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
            padding: 40px;
        }

        .box {
            background: white;
            padding: 30px;
            max-width: 400px;
            margin: auto;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        button {
            padding: 14px 26px;
            font-size: 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin: 10px;
        }

        .danger {
            background: #d9534f;
            color: white;
        }

        .back {
            background: #5bc0de;
            color: white;
        }
    </style>
</head>
<body>

    <div class="box">
        <h2>⚠️ Reset Scanned Tickets?</h2>
        <p style="font-size:18px;">
            This will clear all previously scanned tickets.<br>
            You cannot undo this action.
        </p>

        <button class="danger" onclick="resetScans()">Reset Now</button>
        <br>
        <button class="back" onclick="window.location.href='ticket-scanner.html'">Go Back</button>
    </div>

    <script>
        function resetScans() {
            localStorage.removeItem('scannedTickets');
            window.location.href = 'ticket-scanner.html';
        }
    </script>

</body>
</html>
