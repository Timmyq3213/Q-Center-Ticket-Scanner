<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reset Tickets</title>
<style>
body { font-family:Arial; background:#f4f4f4; text-align:center; padding:40px; }
.box { background:white; padding:30px; max-width:400px; margin:auto; border-radius:12px; }
button { padding:14px 26px; font-size:18px; border:none; border-radius:6px; margin:10px; }
.danger { background:#d9534f; color:white; }
.back { background:#5bc0de; color:white; }
</style>
</head>
<body>

<div class="box">
    <h2>⚠️ Reset All Ticket Data?</h2>
    <p>This clears scanned tickets AND purchased tickets.</p>
    <button class="danger" onclick="resetAll()">Reset Now</button>
    <button class="back" onclick="window.location.href='ticket-scanner.html'">Go Back</button>
</div>

<script>
const repo = "timmyq3213/Q-Center-Ticket-Scanner";
const filePath = "sold.json";
const token = "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"; // ← PASTE TOKEN HERE

async function resetAll() {
    localStorage.removeItem("scannedTickets");

    const getFile = await fetch(`https://api.github.com/repos/${repo}/contents/${filePath}`);
    const fileData = await getFile.json();

    const emptyContent = btoa(JSON.stringify([], null, 2));

    await fetch(`https://api.github.com/repos/${repo}/contents/${filePath}`, {
        method: "PUT",
        headers: {
            "Authorization": `Bearer ${token}`,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: "Reset sold tickets",
            content: emptyContent,
            sha: fileData.sha
        })
    });

    window.location.href = "ticket-scanner.html";
}
</script>

</body>
</html>
